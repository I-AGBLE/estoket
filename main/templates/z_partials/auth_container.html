{% load static %}
<div class="floating_container">
  <div class="auth_container">
    <div class="auth_container_left">
      <img src="{% static 'images/logo.png' %}" alt="" />
    </div>

    <div class="auth_container_right">
      <div class="general_auth_section">
        <div class="general_section">
          <h2>Sign in to your account</h2>

          <div class="social_auth">
            <div class="auth_link">
              <a href="">
                <i class="fa-brands fa-google"></i>
                <p>Sign in with Google</p>
              </a>
            </div>

            <div class="auth_link">
              <a href="" id="emailSignIn">
                <i class="fa-regular fa-envelope"></i>
                <p>Sign in with Account</p>
              </a>
            </div>
          </div>

          <div class="account_auth">
            <form action="" method="POST">
              {% csrf_token %}

              <div class="form_field">{{login_form.email}}</div>

              <div class="form_field">{{login_form.password}}</div>

              <div class="show_password">
                <input type="checkbox" id="showPassword" />
                <label for="showPassword">Show Password</label>
              </div>
              <div class="form_field">
                <button type="submit">Sign In</button>
                <button type="button" id="backToSocial">Back</button>
              </div>
            </form>
          </div>

          <div class="signup_link">
            <p>Don't have an account? <a href="{% url 'app_users:signup' %}">Sign up</a></p>
          </div>
        </div>

        <div class="auth_tnc">
          <p>
            By signing in, you agree to our
            <a href="">Terms & Conditions</a> and
            <a href="">Privacy Policy</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
